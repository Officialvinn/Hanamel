{% extends "base.html" %}
{% block title %}Sign in — Hanamel{% endblock %}
{% block content %}
<div style="max-width:340px;margin:6vh auto">
  <h1>Sign in</h1>
  <p class="sub">Hanamel sales and stock.</p>
  {% if form.errors %}<div class="msg msg-error">That username and password don't match. Try again.</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="field"><label for="id_username">Username</label>{{ form.username }}</div>
    <div class="field"><label for="id_password">Password</label>{{ form.password }}</div>
    <button type="submit" class="btn btn-lg">Sign in</button>
  </form>
</div>
{% endblock %}
