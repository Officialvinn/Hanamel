services:
  - type: web
    name: hanamel
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render creates a strong key for you
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOST
        sync: false                  # set to your-app.onrender.com after first deploy
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: hanamel-db
          property: connectionString

databases:
  - name: hanamel-db
    plan: free
    databaseName: hanamel
    user: hanamel